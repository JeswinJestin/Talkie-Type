name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: TalkieType-windows
            build_cmd: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\\build_windows.ps1
            package_cmd: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\\package_windows.ps1
          - os: macos-latest
            artifact_name: TalkieType-macos
            build_cmd: bash scripts/build_macos.sh
            package_cmd: bash scripts/package_macos.sh
          - os: ubuntu-latest
            artifact_name: TalkieType-linux
            build_cmd: bash scripts/build_linux.sh
            package_cmd: bash scripts/package_linux.sh

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build
        run: ${{ matrix.build_cmd }}
      - name: Package
        run: ${{ matrix.package_cmd }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist_release/*

  release:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist_release
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist_release/**/*
