name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (tag/branch/sha). Leave empty to use the default ref."
        required: false
        default: ""

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: TalkieType-windows
            required_assets: TalkieType-windows.zip
            build_cmd: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\\build_windows.ps1
            package_cmd: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\\package_windows.ps1
          - os: macos-latest
            artifact_name: TalkieType-macos
            required_assets: TalkieType-macos.zip
            build_cmd: bash scripts/build_macos.sh
            package_cmd: bash scripts/package_macos.sh
          - os: ubuntu-latest
            artifact_name: TalkieType-linux
            required_assets: TalkieType-linux.tar.gz
            build_cmd: bash scripts/build_linux.sh
            package_cmd: bash scripts/package_linux.sh

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 python3-gi gir1.2-gtk-3.0 gir1.2-appindicator3-0.1
      - name: System deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install portaudio
      - name: Diagnostics
        run: |
          python -V
          python -c "import platform; print(platform.platform())"
          python -m pip --version
          git rev-parse HEAD
          git show -s --format=%s
      - name: Build
        run: ${{ matrix.build_cmd }}
      - name: Package
        run: ${{ matrix.package_cmd }}
      - name: Verify package output
        run: |
          python -c "import os; req='${{ matrix.required_assets }}'.split(';'); out=os.listdir('dist_release') if os.path.isdir('dist_release') else []; missing=[r for r in req if r and r not in out]; print('dist_release:', out); assert not missing, f'Missing required assets: {missing}'"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist_release/*

  release:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist_release
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist_release/**/*
